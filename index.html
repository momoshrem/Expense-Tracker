<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Expense Tracker</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for the visual breakdown -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #040d14; }
        .robinhood-green { color: #00c805; }
        .robinhood-bg-green { background-color: #00c805; }
        .robinhood-bg-green:hover { background-color: #00b004; }
        .card-dark { background-color: #0e1e24; border: 1px solid #1e323a; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans antialiased pb-16">

    <!-- DASHBOARD HEADER -->
    <header class="border-b border-gray-800 bg-[#040d14] sticky top-0 z-50 backdrop-blur-md bg-opacity-80">
        <div class="max-w-4xl mx-auto px-4 py-6 flex justify-between items-center">
            <div>
                <h1 class="text-sm font-semibold tracking-wider text-gray-400 uppercase">Monthly Expenses</h1>
                <div class="text-4xl font-bold tracking-tight mt-1">$<span id="total-amount">0.00</span></div>
            </div>
            <button id="clear-btn" class="text-xs bg-gray-900 hover:bg-red-950 text-gray-400 hover:text-red-400 px-3 py-1.5 rounded-xl transition border border-gray-800 hover:border-red-900">
                Clear All
            </button>
        </div>
    </header>

    <!-- CONTENT BODY -->
    <main class="max-w-4xl mx-auto px-4 mt-8 space-y-8">
        
        <!-- Top Row: Input and Visual Chart -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <!-- Log Expense Form -->
                <section class="card-dark p-6 rounded-2xl shadow-xl">
                    <h2 class="text-lg font-bold mb-4 text-white">Log Expense</h2>
                    <form id="expense-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Description / Item</label>
                            <input type="text" id="expense-desc" required placeholder="e.g., Electric bill, Rent, Groceries" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-[#00c805] text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Amount ($)</label>
                            <input type="number" id="expense-amount" required step="0.01" min="0.01" placeholder="0.00" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-[#00c805] text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Notes <span class="text-gray-500">(Optional)</span></label>
                            <input type="text" id="expense-note" placeholder="e.g., Confirmation #4920, Due by 15th" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-[#00c805] text-sm">
                        </div>
                        <button type="submit" class="w-full robinhood-bg-green text-[#040d14] font-bold py-3 rounded-xl transition duration-150 text-sm tracking-wide mt-2">Add Expense</button>
                    </form>
                </section>
            </div>

            <!-- Visualization Wheel Column -->
            <div class="space-y-6">
                <section class="card-dark p-6 rounded-2xl shadow-xl flex flex-col items-center justify-center min-h-[320px]">
                    <div class="w-full max-w-[240px] relative">
                        <canvas id="expense-chart"></canvas>
                    </div>
                    <div id="chart-fallback" class="text-sm text-gray-500 text-center mt-4">No data logged yet.</div>
                    
                    <!-- Simple Clean Inline Legend Container -->
                    <div id="chart-legend" class="w-full mt-6 grid grid-cols-2 gap-2 text-xs text-gray-400 max-h-[120px] overflow-y-auto pr-1">
                        <!-- Dynamically populated tags so you know which color belongs to what -->
                    </div>
                </section>
            </div>
        </div>

        <!-- Bottom Row: Sorted Expense List -->
        <section class="card-dark p-6 rounded-2xl shadow-xl">
            <h2 class="text-lg font-bold mb-4 text-white flex items-center justify-between">
                <span>Itemized Breakdown</span>
                <span class="text-xs font-normal text-gray-400 tracking-wide">Click amount or note to edit • Sorted High → Low</span>
            </h2>
            
            <div id="list-fallback" class="text-sm text-gray-500 text-center py-6">No items registered this month.</div>
            
            <div id="expense-list-container" class="divide-y divide-gray-800 hidden">
                <!-- Dynamically populated sorted rows go here -->
            </div>
        </section>

    </main>

    <script>
        // Core Local Storage State Configuration
        let expenses = JSON.parse(localStorage.getItem('ro_pure_local_expenses')) || [];
        let chartInstance = null;

        // Dynamic color generation pool for the pie wheel
        const dynamicColors = [
            '#00c805', '#ff5000', '#ffb700', '#0094ff', 
            '#9d4edd', '#e63946', '#00f5d4', '#ff007f'
        ];

        // UI Document Selectors
        const expenseForm = document.getElementById('expense-form');
        const totalAmountDisplay = document.getElementById('total-amount');
        const clearBtn = document.getElementById('clear-btn');
        const chartLegend = document.getElementById('chart-legend');
        const expenseListContainer = document.getElementById('expense-list-container');
        const listFallback = document.getElementById('list-fallback');

        // Initial Boot Render
        updateApp();

        // Handle Form Log Submissions
        expenseForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const desc = document.getElementById('expense-desc').value.trim();
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const note = document.getElementById('expense-note').value.trim();

            // Add new element directly to array stack with note parameters
            expenses.push({ id: Date.now(), desc, amount, note });
            
            expenseForm.reset();
            updateApp();
        });

        // Clear State Trigger
        clearBtn.addEventListener('click', () => {
            if (expenses.length > 0 && confirm("Are you sure you want to completely clear out this month's tracker data?")) {
                expenses = [];
                updateApp();
            }
        });

        // Single Item Delete Trigger
        function deleteExpense(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            updateApp();
        }

        // Inline Amount Edit Component
        function handleAmountEdit(element, id) {
            const targetExpense = expenses.find(exp => exp.id === id);
            if (!targetExpense) return;

            const rawText = element.textContent.replace(/[$,]/g, '').trim();
            let parsedAmount = parseFloat(rawText);

            if (isNaN(parsedAmount) || parsedAmount < 0) {
                parsedAmount = targetExpense.amount;
            }

            if (targetExpense.amount !== parsedAmount) {
                targetExpense.amount = parsedAmount;
                updateApp();
            } else {
                element.textContent = '$' + targetExpense.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        }

        // Inline Note Edit Component
        function handleNoteEdit(element, id) {
            const targetExpense = expenses.find(exp => exp.id === id);
            if (!targetExpense) return;

            const newNote = element.textContent.trim();
            
            // Check if the change is valid and update the persistent state
            if (targetExpense.note !== newNote) {
                targetExpense.note = newNote;
                localStorage.setItem('ro_pure_local_expenses', JSON.stringify(expenses));
                // Just update storage silently without refreshing the whole list so the user doesn't lose cursor focus
            }
        }

        // Primary Synchronization Core
        function updateApp() {
            // Write data layer strictly down into browser profile cache
            localStorage.setItem('ro_pure_local_expenses', JSON.stringify(expenses));

            // Compute math aggregations
            let absoluteTotal = 0;
            expenses.forEach(exp => absoluteTotal += exp.amount);

            // Render absolute dollar frame layout string
            totalAmountDisplay.textContent = absoluteTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            // Generate the visual components
            updateChart(absoluteTotal);
            renderSortedList();
        }

        // Render Bottom Itemized List View
        function renderSortedList() {
            if (expenses.length === 0) {
                listFallback.classList.remove('hidden');
                expenseListContainer.classList.add('hidden');
                expenseListContainer.innerHTML = '';
                return;
            }

            listFallback.classList.add('hidden');
            expenseListContainer.classList.remove('hidden');

            // Shallow copy array stack and sort descending by amount value
            const sortedExpenses = [...expenses].sort((a, b) => b.amount - a.amount);

            expenseListContainer.innerHTML = sortedExpenses.map(item => {
                const originalIndex = expenses.findIndex(e => e.id === item.id);
                const colorTag = dynamicColors[originalIndex % dynamicColors.length] || '#4b5563';
                const displayNote = item.note || 'Add a note...';

                return `
                    <div class="flex items-center justify-between py-3.5 group hover:bg-[#12232a] px-2 rounded-xl transition-colors duration-150">
                        <div class="flex items-center gap-3 truncate pr-4 min-w-0 flex-grow">
                            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 mt-1 self-start" style="background-color: ${colorTag}"></span>
                            <div class="truncate flex flex-col">
                                <span class="font-medium text-sm text-gray-200 truncate">${escapeHtml(item.desc)}</span>
                                <!-- Editable Note Element -->
                                <span 
                                    contenteditable="true"
                                    onblur="handleNoteEdit(this, ${item.id})"
                                    onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }"
                                    class="text-xs text-gray-500 italic truncate max-w-md focus:text-gray-300 focus:outline-none focus:bg-[#172a32] rounded px-1 transition-all mt-0.5 cursor-text"
                                    title="Click to edit note"
                                >${escapeHtml(displayNote)}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 flex-shrink-0 ml-2">
                            <span 
                                contenteditable="true"
                                onblur="handleAmountEdit(this, ${item.id})"
                                onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }"
                                class="font-mono text-sm font-semibold text-white px-2 py-0.5 rounded border border-transparent hover:border-gray-700 bg-transparent hover:bg-[#172a32] focus:bg-[#172a32] focus:border-[#00c805] focus:outline-none transition-all cursor-edit"
                                title="Click to modify value"
                            >$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            
                            <button onclick="deleteExpense(${item.id})" class="text-gray-500 hover:text-red-400 p-1 rounded transition-colors" title="Delete entry">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Redraw Allocation Pie Wheel Ecosystem
        function updateChart(grandTotal) {
            const fallbackEl = document.getElementById('chart-fallback');
            const canvasEl = document.getElementById('expense-chart');

            if (expenses.length === 0) {
                fallbackEl.classList.remove('hidden');
                canvasEl.classList.add('hidden');
                chartLegend.innerHTML = '';
                if (chartInstance) chartInstance.destroy();
                return;
            }

            fallbackEl.classList.add('hidden');
            canvasEl.classList.remove('hidden');

            const labels = expenses.map(e => e.desc);
            const dataValues = expenses.map(e => e.amount);
            const colors = expenses.map((_, index) => dynamicColors[index % dynamicColors.length]);

            // Build dynamic side legend labels
            chartLegend.innerHTML = '';
            expenses.forEach((e, idx) => {
                const color = colors[idx];
                const itemPct = ((e.amount / grandTotal) * 100).toFixed(0);
                chartLegend.innerHTML += `
                    <div class="flex items-center gap-2 truncate">
                        <span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color: ${color}"></span>
                        <span class="truncate text-gray-300">${escapeHtml(e.desc)}</span>
                        <span class="text-gray-500 font-mono text-[10px] ml-auto">${itemPct}%</span>
                    </div>
                `;
            });

            if (chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = dataValues;
                chartInstance.data.datasets[0].backgroundColor = colors;
                chartInstance.update();
            } else {
                const ctx = canvasEl.getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{ data: dataValues, backgroundColor: colors, borderWidth: 2, borderColor: '#0e1e24', hoverOffset: 6 }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#172a32', titleColor: '#fff', bodyColor: '#ccc', cornerRadius: 8, padding: 10,
                                callbacks: {
                                    label: function(context) {
                                        const val = context.raw || 0;
                                        const pct = ((val / grandTotal) * 100).toFixed(1);
                                        return ` ${context.label}: $${val.toFixed(2)} (${pct}%)`;
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }

        // Sanitization safety helper
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
