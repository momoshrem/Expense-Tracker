<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0e1e24]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full font-sans antialiased text-gray-200 selection:bg-emerald-500 selection:text-black">

    <div id="app-scroll-container" class="flex h-full flex-col lg:flex-row max-w-7xl mx-auto overflow-y-auto lg:overflow-hidden bg-[#0e1e24]">
        <main id="main-scroll-container" class="w-full lg:flex-1 flex flex-col justify-start p-6 lg:p-8 lg:border-r lg:border-gray-900 lg:overflow-y-auto no-scrollbar">
            <header class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-xs uppercase tracking-widest text-gray-500 font-bold">Total Monthly Expenses</h1>
                    <div class="flex items-baseline gap-1 mt-1 text-white">
                        <span class="text-2xl font-light text-gray-400">$</span>
                        <span id="total-amount" class="text-5xl font-semibold tracking-tight">0.00</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <button id="sync-badge" class="flex items-center gap-2 bg-[#172a32] px-3 py-1.5 rounded-full border border-gray-800 hover:border-gray-700 transition">
                        <span id="sync-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                        <span id="sync-text" class="text-xs font-medium text-gray-400 font-mono">Initializing...</span>
                    </button>
                    <button id="settings-trigger" class="text-[11px] text-gray-500 hover:text-gray-300 underline underline-offset-2">GitHub sync settings</button>
                </div>
            </header>

            <section class="bg-[#12242c] rounded-2xl border border-gray-900 p-6 shadow-xl mb-4">
                <h2 class="text-sm font-semibold text-gray-400 mb-6 tracking-wide">Expense Wheel</h2>
                <div class="flex flex-col md:flex-row gap-8 items-center justify-center">
                    <div class="relative w-40 h-40 sm:w-48 sm:h-48 flex-shrink-0 flex items-center justify-center">
                        <div id="chart-fallback" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 bg-[#172a32] rounded-full border border-dashed border-gray-750">
                            <span class="text-xs text-gray-500">Awaiting allocations</span>
                        </div>
                        <canvas id="expense-chart" class="w-full h-full hidden"></canvas>
                    </div>
                    <div id="chart-legend" class="flex-1 grid grid-cols-2 gap-x-4 gap-y-2.5 text-xs w-full max-w-sm md:max-w-none"></div>
                </div>
            </section>
        </main>

        <aside class="w-full lg:w-[460px] flex flex-col bg-[#0b171c] border-t lg:border-t-0 border-gray-900 lg:h-full">
            <div id="aside-scroll-container" class="flex-1 lg:overflow-y-auto no-scrollbar p-6 space-y-2">
                <div id="maaser-pinned-container"></div>
                <div id="list-fallback" class="py-12 text-center text-gray-600 text-sm hidden">No expenses mapped yet.</div>
                <div id="expense-list-container"></div>
            </div>
        </aside>
    </div>

    <div id="fab-stack" class="fixed bottom-6 right-6 z-40 transition-all duration-300 ease-out">
        <button id="global-fab" class="bg-[#00c805] hover:bg-emerald-500 text-black p-4 rounded-full shadow-2xl transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2.5" d="M12 4v16m8-8H4" /></svg></button>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-50 pointer-events-none opacity-0 transition-opacity duration-200 flex items-end sm:items-center sm:justify-center p-0 sm:p-4">
        <div class="w-full sm:max-w-md bg-[#12242c] border border-gray-900 rounded-t-3xl sm:rounded-2xl p-6 transition-transform duration-200 transform translate-y-full sm:translate-y-4">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-base font-semibold text-white">Add Expense</h3>
                <button class="close-modal-btn text-gray-500 hover:text-white" data-target="modal-overlay">Close</button>
            </div>
            <form id="global-expense-form" class="space-y-4">
                <input type="text" id="expense-desc" required placeholder="Description" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white">
                <input type="number" step="0.01" min="0.01" id="expense-amount" required placeholder="Amount" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white">
                <input type="text" id="expense-note" placeholder="Optional note..." class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white">
                <button type="submit" class="w-full bg-[#00c805] hover:bg-emerald-500 text-black font-semibold text-sm py-3 rounded-xl">Add Expense</button>
            </form>
        </div>
    </div>

    <div id="view-modal-overlay" class="modal-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-50 pointer-events-none opacity-0 transition-opacity duration-200 flex items-end sm:items-center sm:justify-center p-0 sm:p-4">
        <div class="w-full sm:max-w-md bg-[#12242c] border border-gray-900 rounded-t-3xl sm:rounded-2xl p-6 transition-transform duration-200 transform translate-y-full sm:translate-y-4">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-base font-semibold text-white">Expense Details</h3>
                <button class="close-modal-btn text-gray-500 hover:text-white" data-target="view-modal-overlay">Close</button>
            </div>
            <form id="view-expense-form" class="space-y-4">
                <input type="hidden" id="edit-expense-id">
                <input type="text" id="edit-expense-desc" required class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white">
                <input type="number" step="0.01" min="0.01" id="edit-expense-amount" required class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white">
                <textarea id="edit-expense-note" rows="4" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white"></textarea>
                <div class="flex gap-3">
                    <button id="delete-view-btn" type="button" class="flex-1 bg-red-950/40 border border-red-900 text-red-200 rounded-xl">Delete</button>
                    <button type="submit" class="flex-1 bg-[#00c805] text-black font-semibold rounded-xl">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="settings-overlay" class="modal-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-50 pointer-events-none opacity-0 transition-opacity duration-200 flex items-end sm:items-center sm:justify-center p-0 sm:p-4">
        <div class="w-full sm:max-w-md bg-[#12242c] border border-gray-900 rounded-t-3xl sm:rounded-2xl p-6 transition-transform duration-200 transform translate-y-full sm:translate-y-4">
            <h3 class="text-base font-semibold text-white mb-4">GitHub Sync</h3>
            <input type="password" id="gh-token" placeholder="Personal Access Token" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white mb-4">
            <input type="text" id="gh-gist-id" placeholder="Gist ID" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white mb-4">
            <p id="gh-settings-status" class="text-xs mb-4 min-h-[1em]"></p>
            <button id="gh-connect-btn" class="w-full bg-[#00c805] text-black font-semibold text-sm py-3 rounded-xl">Save & Connect</button>
            <button class="close-modal-btn w-full mt-2 text-gray-500 text-xs" data-target="settings-overlay">Cancel</button>
        </div>
    </div>

    <div id="maaser-modal-overlay" class="modal-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-50 pointer-events-none opacity-0 transition-opacity duration-200 flex items-end sm:items-center sm:justify-center p-0 sm:p-4">
        <div class="w-full sm:max-w-md max-h-[85vh] flex flex-col bg-[#12242c] border border-gray-900 rounded-t-3xl sm:rounded-2xl p-6 transition-transform duration-200 transform translate-y-full sm:translate-y-4">
            <h3 class="text-base font-semibold text-white mb-4">Maaser</h3>
            <form id="maaser-form" class="space-y-4">
                <input type="number" step="0.01" id="maaser-amount-input" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white">
                <button type="submit" class="w-full bg-[#00c805] text-black font-semibold text-sm py-3 rounded-xl">Save Amount</button>
            </form>
            <div id="maaser-history-list" class="mt-6 pt-4 border-t border-gray-800 overflow-y-auto no-scrollbar space-y-2"></div>
            <button class="close-modal-btn w-full mt-4 text-gray-500 text-xs" data-target="maaser-modal-overlay">Close</button>
        </div>
    </div>

    <script>
        const GIST_FILE_NAME = 'streamline-data.json', DYNAMIC_COLORS = ['#00c805', '#ff5000', '#ffb700', '#0094ff', '#9d4edd', '#e63946', '#00f5d4', '#ff007f'];
        const localSyncChannel = new BroadcastChannel('streamline_local_sync');
        let chartInstance = null, ghSettings = JSON.parse(localStorage.getItem('streamline_gh_settings')) || { token: '', gistId: '' };
        let expenses = JSON.parse(localStorage.getItem('ro_pure_local_expenses')) || [], maaser = JSON.parse(localStorage.getItem('ro_pure_local_maaser')) || { amount: 0, history: [] };
        const els = { totalAmount: document.getElementById('total-amount'), expenseList: document.getElementById('expense-list-container'), listFallback: document.getElementById('list-fallback'), chartLegend: document.getElementById('chart-legend'), chartCanvas: document.getElementById('expense-chart'), chartFallback: document.getElementById('chart-fallback'), maaserPinned: document.getElementById('maaser-pinned-container'), syncDot: document.getElementById('sync-dot'), syncText: document.getElementById('sync-text'), maaserHistory: document.getElementById('maaser-history-list') };

        const escapeHtml = (str) => String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
        const setSyncStatus = (state, msg) => { els.syncText.textContent = msg; els.syncDot.className = `w-2 h-2 rounded-full animate-pulse ${state === 'success' ? 'bg-[#00c805]' : state === 'syncing' ? 'bg-yellow-500' : 'bg-red-500'}`; };
        const toggleModal = (id, show) => { const el = document.getElementById(id); el.classList.toggle('pointer-events-none', !show); el.classList.toggle('opacity-0', !show); el.firstElementChild.classList.toggle('translate-y-full', !show); el.firstElementChild.classList.toggle('sm:translate-y-4', !show); };

        async function commitChanges() {
            updateAppUI();
            localSyncChannel.postMessage({ expenses, maaser });
            await pushToCloud();
        }

        async function pushToCloud() {
            if (!ghSettings.token || !ghSettings.gistId) return setSyncStatus('error', 'Not connected');
            try {
                const res = await fetch(`https://api.github.com/gists/${ghSettings.gistId}`, { method: 'PATCH', headers: { 'Authorization': `token ${ghSettings.token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ files: { [GIST_FILE_NAME]: { content: JSON.stringify({ expenses, maaser }) } } }) });
                res.ok ? setSyncStatus('success', 'Live Synced') : setSyncStatus('error', 'Sync Failed');
            } catch (e) { setSyncStatus('error', 'Network Error'); }
        }

        async function pullFromCloud() {
            if (!ghSettings.token || !ghSettings.gistId || document.hidden) return;
            try {
                const res = await fetch(`https://api.github.com/gists/${ghSettings.gistId}`, { headers: { 'Authorization': `token ${ghSettings.token}` } });
                if (res.ok) {
                    const data = await res.json(), file = data.files[GIST_FILE_NAME];
                    const content = file.truncated ? await (await fetch(file.raw_url)).text() : file.content;
                    const d = JSON.parse(content);
                    expenses = d.expenses || []; maaser = d.maaser || { amount: 0, history: [] };
                    updateAppUI();
                    setSyncStatus('success', 'Live Synced');
                }
            } catch (e) { setSyncStatus('error', 'Disconnected'); }
        }

        function updateAppUI() {
            localStorage.setItem('ro_pure_local_expenses', JSON.stringify(expenses));
            localStorage.setItem('ro_pure_local_maaser', JSON.stringify(maaser));
            const total = expenses.reduce((sum, e) => sum + e.amount, 0);
            els.totalAmount.textContent = total.toLocaleString('en-US', { minimumFractionDigits: 2 });
            const sorted = [...expenses].sort((a, b) => b.amount - a.amount);
            renderMaaser(); renderSortedList(sorted); updateChart(sorted, total);
        }

        function renderMaaser() {
            els.maaserPinned.innerHTML = `<div class="maaser-trigger flex items-center justify-between py-3.5 px-2 rounded-xl bg-[#12242c] border border-emerald-900/40 cursor-pointer"><div class="flex items-center gap-3"><span class="w-2.5 h-2.5 rounded-full bg-[#00c805]"></span><span class="text-sm">Maaser</span></div><span contenteditable="true" class="maaser-edit-span font-mono text-sm bg-[#172a32] px-2 rounded">$${maaser.amount.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span></div>`;
        }

        function renderSortedList(sorted) {
            els.listFallback.classList.toggle('hidden', sorted.length > 0);
            els.expenseList.innerHTML = sorted.map((item, i) => `
                <div class="expense-row flex items-center justify-between py-3.5 px-2 rounded-xl hover:bg-[#12242c]/40 cursor-pointer" data-id="${item.id}">
                    <div class="flex items-center gap-3 flex-grow"><span class="w-2.5 h-2.5 rounded-full" style="background:${DYNAMIC_COLORS[i % DYNAMIC_COLORS.length]}"></span><div class="flex flex-col"><span class="text-sm">${escapeHtml(item.desc)}</span><span class="text-xs text-gray-500">${escapeHtml(item.note || 'Click to note')}</span></div></div>
                    <span contenteditable="true" class="expense-edit-span font-mono text-sm bg-[#172a32] px-2 rounded" data-id="${item.id}">$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                </div>`).join('');
        }

        function updateChart(sorted, total) {
            if (sorted.length === 0) { els.chartFallback.classList.remove('hidden'); els.chartCanvas.classList.add('hidden'); return; }
            els.chartFallback.classList.add('hidden'); els.chartCanvas.classList.remove('hidden');
            const data = { labels: sorted.map(e => e.desc), datasets: [{ data: sorted.map(e => e.amount), backgroundColor: sorted.map((_, i) => DYNAMIC_COLORS[i % DYNAMIC_COLORS.length]) }] };
            if (chartInstance) { chartInstance.data = data; chartInstance.update(); }
            else chartInstance = new Chart(els.chartCanvas, { type: 'pie', data, options: { plugins: { legend: { display: false } } } });
        }

        document.addEventListener('click', e => {
            if (e.target.classList.contains('close-modal-btn')) toggleModal(e.target.dataset.target, false);
            else if (e.target.id === 'global-fab') toggleModal('modal-overlay', true);
            else if (e.target.closest('.maaser-trigger') && !e.target.classList.contains('maaser-edit-span')) toggleModal('maaser-modal-overlay', true);
            else if (e.target.closest('.expense-row') && !e.target.classList.contains('expense-edit-span')) {
                const item = expenses.find(x => x.id === e.target.closest('.expense-row').dataset.id);
                document.getElementById('edit-expense-id').value = item.id;
                document.getElementById('edit-expense-desc').value = item.desc;
                document.getElementById('edit-expense-amount').value = item.amount;
                document.getElementById('edit-expense-note').value = item.note || '';
                toggleModal('view-modal-overlay', true);
            }
        });

        document.addEventListener('focusout', async e => {
            if (e.target.classList.contains('expense-edit-span')) {
                const item = expenses.find(x => x.id === e.target.dataset.id);
                item.amount = parseFloat(e.target.textContent.replace(/[^0-9.]/g, '')) || item.amount;
                await commitChanges();
            } else if (e.target.classList.contains('maaser-edit-span')) {
                maaser.amount = parseFloat(e.target.textContent.replace(/[^0-9.]/g, '')) || maaser.amount;
                await commitChanges();
            }
        });

        document.getElementById('global-expense-form').onsubmit = async e => { e.preventDefault(); expenses.push({ id: crypto.randomUUID(), desc: document.getElementById('expense-desc').value, amount: parseFloat(document.getElementById('expense-amount').value), note: document.getElementById('expense-note').value }); e.target.reset(); await commitChanges(); toggleModal('modal-overlay', false); };
        document.getElementById('view-expense-form').onsubmit = async e => { e.preventDefault(); const item = expenses.find(x => x.id === document.getElementById('edit-expense-id').value); item.desc = document.getElementById('edit-expense-desc').value; item.amount = parseFloat(document.getElementById('edit-expense-amount').value); item.note = document.getElementById('edit-expense-note').value; await commitChanges(); toggleModal('view-modal-overlay', false); };
        document.getElementById('delete-view-btn').onclick = async () => { expenses = expenses.filter(x => x.id !== document.getElementById('edit-expense-id').value); await commitChanges(); toggleModal('view-modal-overlay', false); };

        async function initApp() { updateAppUI(); if (ghSettings.token) { await pullFromCloud(); setInterval(pullFromCloud, 60000); } else setSyncStatus('error', 'Not connected'); }
        initApp();
    </script>
</body>
</html>
